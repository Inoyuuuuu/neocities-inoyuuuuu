<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Inoyuuuuu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <header>
    <h1>Inoyuuuuu</h1>
  </header>

  <main>

    <div id="static-card-container">

      <div id="main-card" class="card static">
        <p>hi o/</p>
      </div>
    </div>

    <div id="movable-card-container">

      <div id="cat-card" class="card movable">
        <img alt="picture of a cat" src="https://i.imgflip.com/8t7vw9.jpg" />
        <p id="intro-text">cat approves</p>
      </div>

      <div id="github-card" class="card movable">
        <a href="https://github.com/Inoyuuuuu/neocities-inoyuuuuu" target="_blank">
          <img id="cat-image" src="/images/GitHub_Invertocat_White.png" />
        </a>
      </div>

      <div id="inspirocard" class="card movable">
        <button id="inspirocard-button"><b>Useless Button :c</b></button>
        <p>Since some API calls are blocked by neocities.</p>
      </div>

    </div>
  </main>

  <script src="/scripts/movable_cards.js"></script>
  <script src="/scripts/card_start_location.js"></script>
  <script src="/scripts/useless_button.js"></script>

</body>

</html>
